version: "3.8"

services:
  mongo:
    image: mongodb-raspberrypi4-unofficial-r7.0.14:latest
    container_name: mongo
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d
  scraper:
    build: .
    container_name: navcanada_scraper
    environment:
      - MONGO_URI=mongodb://mongo:27017/
      - ICAO_CODES=CYYU,CYUL,CYTF,CYFC
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo-data:
